<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="src/styles.css">
    <meta name="page" content="schedule">
    <title>Schedule</title>

    <script src="https://kit.fontawesome.com/c2296d1cad.js" crossorigin="anonymous"></script>
</head>
<body>
    <h1>Schedule</h1>
    <div id="progress-overlay" class="loading-overlay" aria-hidden="true">
        <div class="loading-content" role="status" aria-live="polite">
            <div class="loading-spinner" aria-hidden="true"></div>
            <p id="progress">Scheduling tasks, do not close...</p>
        </div>
    </div>
    <br>

    <div class="main-buttons">
        <button id="schedule-button" title="Schedule Tasks">
            <span>
                <i class="fas fa-bolt"></i>
            </span>
        </button>
    </div>

    <section id="schedule-display">
        
    </section>
    <script type="module" src="src/schedule.ts"></script>

    <!-- Navigation -->
    <nav>
        <a href="index.html">
        <span>
            <i class="fas fa-home"></i>
        </span>
        </a>

        <a href="schedule.html">
        <span style="color: white;border-bottom: 1px solid white;">
            <i class="fas fa-calendar-alt"></i>
        </span>
        </a>
    </nav>
    <!-- End Navigation -->
</body>
</html>
